<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Off-white warm background -->
  <rect width="120" height="120" rx="26" fill="#f9f7f4"/>

  <!-- Scan frame corners — top in deep blue, bottom fading -->
