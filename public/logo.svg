  <path d="M76,26 L94,26 L94,44" stroke="#2563eb" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M26,76 L26,94 L44,94" stroke="#93b4f7" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M76,94 L94,94 L94,76" stroke="#93b4f7" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Scan line -->
  <line x1="26" y1="60" x2="94" y2="60" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Badge content lines -->
  <rect x="38" y="46" width="32" height="4.5" rx="2.5" fill="#2563eb" opacity="0.3"/>
  <rect x="38" y="69" width="22" height="4" rx="2" fill="#2563eb" opacity="0.18"/>
